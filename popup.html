<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #1a1a1a;
      color: #e5e5e5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header img { width: 20px; height: 20px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label { font-size: 13px; color: #a3a3a3; }
    .status {
      font-size: 12px;
      font-weight: 500;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      text-align: center;
    }
    .status.on  { background: #052e16; color: #4ade80; }
    .status.off { background: #262626; color: #737373; }

    /* Toggle switch */
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #404040;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #16a34a; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon32.png" alt="">
    <h1>Claude Incognito</h1>
  </div>
  <div class="row">
    <span class="label">Force incognito</span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
